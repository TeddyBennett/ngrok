<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Development Server...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f9fafb;
            margin: 0;
            color: #374151;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p id="status">Bypassing security filters and connecting to your app...</p>

    <script>
        // Make sure this matches your live ngrok URL
        const NGROK_URL = "https://squeeze-tinderbox-credit.ngrok-free.dev";

        async function bypassAndRedirect() {
            try {
                // 1. Silent fetch to plant the cookie and bypass ngrok warning
                await fetch(NGROK_URL, {
                    method: "GET",
                    mode: "no-cors", 
                    headers: {
                        "ngrok-skip-browser-warning": "69420" // Can be any text value
                    }
                });

                // 2. Small delay to ensure the browser saves the session state
                setTimeout(() => {
                    window.location.href = NGROK_URL;
                }, 500);

            } catch (error) {
                console.error("Bypass failed, trying direct connection...", error);
                window.location.href = NGROK_URL;
            }
        }

        // Run automatically when the page loads so users don't even have to click!
        window.addEventListener("DOMContentLoaded", bypassAndRedirect);
    </script>
</body>
</html>
